app = "salesforge"
primary_region = "sin"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "data"
  destination = "/data"

[env]
  APP_NAME = "SalesForge"
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://salesforge.fly.dev"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  LOG_CHANNEL = "stderr"
  OPENROUTER_MODEL = "google/gemma-4-31b-it:free"
